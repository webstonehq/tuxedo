name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v2026.5.1)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
            linker: aarch64-linux-gnu-gcc
            apt_packages: gcc-aarch64-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        if: matrix.apt_packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.apt_packages }}

      - name: Configure cross linker
        if: matrix.linker
        run: |
          target_upper=$(echo "${{ matrix.target }}" | tr '[:lower:]-' '[:upper:]_')
          echo "CARGO_TARGET_${target_upper}_LINKER=${{ matrix.linker }}" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          version="${{ inputs.tag || github.ref_name }}"
          stage="tuxedo-${version}-${{ matrix.target }}"
          mkdir -p "dist/${stage}"
          cp "target/${{ matrix.target }}/release/tuxedo" "dist/${stage}/"
          cp README.md "dist/${stage}/" 2>/dev/null || true
          tar -C dist -czf "dist/${stage}.tar.gz" "${stage}"
          shasum -a 256 "dist/${stage}.tar.gz" > "dist/${stage}.tar.gz.sha256"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $version = "${{ inputs.tag || github.ref_name }}"
          $stage = "tuxedo-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$stage" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/tuxedo.exe" "dist/$stage/"
          if (Test-Path README.md) { Copy-Item README.md "dist/$stage/" }
          Compress-Archive -Path "dist/$stage/*" -DestinationPath "dist/$stage.zip"
          (Get-FileHash "dist/$stage.zip" -Algorithm SHA256).Hash | Out-File -Encoding ascii "dist/$stage.zip.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: tuxedo-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256

  update-tap:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6
        with:
          repository: webstonehq/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Render formula
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          fetch_sha() {
            curl -fsSL \
              "https://github.com/webstonehq/tuxedo/releases/download/${TAG}/tuxedo-${TAG}-$1.tar.gz.sha256" \
              | awk '{print $1}'
          }
          sha_darwin_arm=$(fetch_sha aarch64-apple-darwin)
          sha_darwin_intel=$(fetch_sha x86_64-apple-darwin)
          sha_linux_arm=$(fetch_sha aarch64-unknown-linux-gnu)
          sha_linux_intel=$(fetch_sha x86_64-unknown-linux-gnu)

          cat > tap/Formula/tuxedo.rb <<EOF
          class Tuxedo < Formula
            desc "Fast, keyboard-driven terminal UI for todo.txt"
            homepage "https://github.com/webstonehq/tuxedo"
            version "${version}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/webstonehq/tuxedo/releases/download/v#{version}/tuxedo-v#{version}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_darwin_arm}"
              end
              on_intel do
                url "https://github.com/webstonehq/tuxedo/releases/download/v#{version}/tuxedo-v#{version}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_darwin_intel}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/webstonehq/tuxedo/releases/download/v#{version}/tuxedo-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_arm}"
              end
              on_intel do
                url "https://github.com/webstonehq/tuxedo/releases/download/v#{version}/tuxedo-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_linux_intel}"
              end
            end

            def install
              bin.install "tuxedo"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/tuxedo --version")
            end
          end
          EOF

      - name: Commit and push
        env:
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          cd tap
          git config user.name  "tuxedo-release-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet Formula/tuxedo.rb; then
            echo "Formula already up to date; nothing to commit."
            exit 0
          fi
          git add Formula/tuxedo.rb
          git commit -m "tuxedo ${TAG}"
          git push
